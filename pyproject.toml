[project]
name = "ferret"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = "==3.12.13"
dependencies = [
    "mitmproxy>=12.2.3",
    "pyside6==6.10.3",
    "pyside6-fluent-widgets[full]==1.11.2",
    "psutil>=5.9.0",
    "pygments>=2.20.0",
]

[project.scripts]
start = "ferret.__main__:main"
lupdate = "ferret.utils.scripts:pyside6_lupdate"
lrelease = "ferret.utils.scripts:pyside6_lrelease"
rcc = "ferret.utils.scripts:pyside6_rcc"

[build-system]
requires = ["uv_build>=0.11.12,<0.12"]
build-backend = "uv_build"
